<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS — Plataforma de Estudos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════
   DESIGN TOKENS (MODO ESCURO - PADRÃO)
════════════════════════════════ */
:root {
  --bg-base:    #080c14;
  --bg-1:       #0d1117;
  --bg-2:       #111827;
  --bg-3:       #1a2235;
  --bg-hover:   #1e2a3d;
  --bd-soft:    rgba(255,255,255,0.06);
  --bd-mid:     rgba(255,255,255,0.10);
  --bd-strong:  rgba(255,255,255,0.18);
  --accent:     #7c6fee;
  --accent-dim: rgba(124,111,238,0.14);
  --accent-glow:rgba(124,111,238,0.25);
  --green:      #34d399;
  --green-dim:  rgba(52,211,153,0.12);
  --rose:       #fb7185;
  --rose-dim:   rgba(251,113,133,0.12);
  --tx-1: #f1f5f9;
  --tx-2: #94a3b8;
  --tx-3: #475569;
  --tx-accent: #a89df5;
  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px;
  --sidebar-w: 260px;
  --ease: cubic-bezier(.25,.46,.45,.94);
}

/* ════════════════════════════════
   DESIGN TOKENS (MODO CLARO)
════════════════════════════════ */
[data-theme="light"] {
  --bg-base:    #f8fafc;
  --bg-1:       #ffffff;
  --bg-2:       #f1f5f9;
  --bg-3:       #e2e8f0;
  --bg-hover:   #cbd5e1;
  --bd-soft:    rgba(0,0,0,0.06);
  --bd-mid:     rgba(0,0,0,0.12);
  --bd-strong:  rgba(0,0,0,0.25);
  --tx-1:       #0f172a;
  --tx-2:       #334155;
  --tx-3:       #64748b;
  --tx-accent:  #4f46e5;
  --accent:     #6366f1;
  --accent-glow: rgba(99,102,241,0.2);
}

/* ESTILOS DO BANNER E CARGOS */
.sb-user-card { 
  margin: 12px; border-radius: var(--r-md); overflow: hidden; 
  background: var(--bg-2); border: 1px solid var(--bd-soft);
  cursor: pointer; transition: all 0.3s var(--ease); position: relative;
}
.sb-user-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.sb-banner { 
  height: 60px; background: var(--accent-dim); 
  background-size: cover; background-position: center;
  border-bottom: 1px solid var(--bd-soft);
}
.sb-user-content { 
  padding: 12px; display: flex; align-items: center; gap: 10px; 
  margin-top: -25px; position: relative; z-index: 2;
}
.sb-avatar { 
  width: 42px; height: 42px; border-radius: 12px; 
  border: 3px solid var(--bg-2); background: var(--accent);
  background-size: cover; background-position: center;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: #fff;
}
.rank-owner { 
  background: linear-gradient(135deg, #ef4444, #b91c1c) !important; 
  color: #fff !important; font-weight: 700; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
}

/* Efeito Glow para o Fórum */
.forum-card { 
  background: var(--bg-1); border: 1px solid var(--bd-soft); 
  border-radius: var(--r-lg); padding: 24px; margin-bottom: 20px;
  transition: 0.3s;
}
.forum-card:hover { border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.forum-pfp { width: 48px; height: 48px; border-radius: 14px; background: var(--accent); background-size: cover; }

/* Botão Flutuante de Tema */
.theme-toggle {
  position: fixed; bottom: 20px; left: 20px; width: 40px; height: 40px;
  border-radius: 50%; background: var(--bg-2); border: 1px solid var(--bd-mid);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 9999; transition: 0.3s; color: var(--tx-2);
}
.theme-toggle:hover { transform: scale(1.1); color: var(--accent); }

/* (Resto do seu CSS original de 2000 linhas continua aqui...) */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg-base); color: var(--tx-1); min-height: 100vh; transition: background 0.3s; }

/* ... [Omitindo as 1000 linhas de animações e grids que você já tem para não estourar o limite, mas no seu arquivo você mantém todas] ... */

   </style>
</head>
<body>

<div id="app" class="on">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-brand" onclick="nav('dash')">
        <div class="sb-brand-icon">S</div>
        <div class="sb-brand-name">Study<span>OS</span></div>
      </div>

      <div class="sb-user-card" onclick="openProfileSettings()">
        <div class="sb-banner" id="userBanner"></div>
        <div class="sb-user-content">
          <div class="sb-avatar" id="userAvatar">U</div>
          <div class="sb-user-info">
            <div class="sb-username" id="displayUsername">Carregando...</div>
            <div class="sb-rank-pill pill-neutral" id="userRankTag">Membro</div>
          </div>
        </div>
      </div>
    </div>

    <nav class="sb-nav">
      <div class="sb-section">Principal</div>
      <div class="sb-item on" onclick="nav('dash', this)">
        <span class="sb-ico">🏠</span> Dashboard
      </div>
      <div class="sb-item" onclick="nav('tasks', this)">
        <span class="sb-ico">✅</span> Tarefas
      </div>
      <div class="sb-item" onclick="nav('forum', this)">
        <span class="sb-ico">💬</span> Fórum
      </div>
      </nav>
  </aside>

  <main class="main" id="mainContent">
    </main>
</div>

<div class="overlay" id="modalProfile" style="display:none;">
  <div class="modal">
    <div class="modal-title">Configurações de Perfil</div>
    <div class="fg">
      <label>URL da Foto de Perfil</label>
      <input type="text" class="inp" id="editPfp" placeholder="https://imagem.jpg">
    </div>
    <div class="fg">
      <label>URL do Banner</label>
      <input type="text" class="inp" id="editBanner" placeholder="https://banner.jpg">
    </div>
    <div class="fg">
      <label>Código de Cargo (Staff)</label>
      <input type="password" class="inp" id="editStaffCode" placeholder="Insira o código secreto">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalProfile')">Cancelar</button>
      <button class="btn btn-accent" onclick="saveNewProfile()">Salvar Alterações</button>
    </div>
  </div>
</div>

<div class="theme-toggle" onclick="toggleTheme()">🌓</div>

   <script>
// ═══════════════════════════════
//  SISTEMA DE TEMA E DADOS
// ═══════════════════════════════

function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const target = current === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', target);
    localStorage.setItem('studyos_theme', target);
}

function openProfileSettings() {
    document.getElementById('modalProfile').style.display = 'flex';
    document.getElementById('editPfp').value = localStorage.getItem('user_pfp') || '';
    document.getElementById('editBanner').value = localStorage.getItem('user_banner') || '';
}

function saveNewProfile() {
    const pfp = document.getElementById('editPfp').value;
    const banner = document.getElementById('editBanner').value;
    const staff = document.getElementById('editStaffCode').value;

    if(pfp) localStorage.setItem('user_pfp', pfp);
    if(banner) localStorage.setItem('user_banner', banner);
    
    // Código para virar Dono
    if(staff === 'SOU_DONO') {
        localStorage.setItem('user_rank', 'owner');
    }

    alert('Perfil atualizado com sucesso!');
    location.reload();
}

function loadThemeAndUser() {
    // Carrega Tema
    const savedTheme = localStorage.getItem('studyos_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // Carrega Dados Visuais
    const pfp = localStorage.getItem('user_pfp');
    const banner = localStorage.getItem('user_banner');
    const rank = localStorage.getItem('user_rank');

    if(pfp) {
        const av = document.getElementById('userAvatar');
        av.style.backgroundImage = `url('${pfp}')`;
        av.innerText = '';
    }
    if(banner) {
        document.getElementById('userBanner').style.backgroundImage = `url('${banner}')`;
    }
    if(rank === 'owner') {
        const tag = document.getElementById('userRankTag');
        tag.innerText = 'Dono';
        tag.className = 'sb-rank-pill rank-owner';
    }
}

// ═══════════════════════════════
//  FÓRUM MELHORADO (RENDER)
// ═══════════════════════════════

function renderForum() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="pad" style="max-width:900px; margin: 0 auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h1 class="ph-title">Comunidade <span>StudyOS</span></h1>
                <button class="btn btn-accent" onclick="openNewPostModal()">+ Nova Postagem</button>
            </div>

            <div class="forum-card">
                <div style="display:flex; gap:15px; margin-bottom:15px;">
                    <div class="forum-pfp" style="background-image:url('${localStorage.getItem('user_pfp') || ''}')"></div>
                    <div>
                        <h4 style="color:var(--tx-1)">Você <span class="sb-rank-pill ${localStorage.getItem('user_rank')==='owner'?'rank-owner':'pill-v'}">${localStorage.getItem('user_rank')==='owner'?'Dono':'Membro'}</span></h4>
                        <span style="font-size:12px; color:var(--tx-3)">Postado agora</span>
                    </div>
                </div>
                <div style="color:var(--tx-2); line-height:1.6; margin-bottom:20px;">
                    Este é o novo visual do fórum! Agora com suporte a banners de perfil e o modo claro/escuro.
                </div>
                <div style="display:flex; gap:20px; border-top:1px solid var(--bd-soft); padding-top:15px;">
                    <button class="btn btn-ghost btn-sm">❤️ 42 Curtidas</button>
                    <button class="btn btn-ghost btn-sm">💬 12 Comentários</button>
                </div>
            </div>
        </div>
    `;
}

// ═══════════════════════════════
//  INICIALIZAÇÃO (UNIFICADA)
// ═══════════════════════════════

window.onload = () => {
    loadThemeAndUser();
    // Chame aqui sua função original de carregar o Dashboard
    nav('dash');
};

function nav(page, el) {
    // Lógica simples de navegação para teste
    if(el) {
        document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('on'));
        el.classList.add('on');
    }
    if(page === 'forum') renderForum();
    if(page === 'dash') {
        document.getElementById('mainContent').innerHTML = '<div class="pad"><h1>Bem-vindo ao Dashboard!</h1></div>';
    }
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

/* ... [Aqui você mantém todas as suas 1000+ linhas originais de Pomodoro, Flashcards, Banco de Dados e as funções de esc(), initials(), etc.] ... */

</script>
</body>
</html>
